tasks:
  - name: AutoIncrementCounter
    description: Increment the counter
    cronjob:
      cronExpression: "*/5 * * * * *"
    retryPolicy:
      interval: 30m
      maxAttempts: -1
    parameters:
      $ref: ./schemas/counter/counter.yaml#schemas/IncrementCounterParams
  - name: IncrementCounter
    description: Increment the counter
    retryPolicy:
      interval: 30m
      maxAttempts: -1
    parameters:
      $ref: ./schemas/counter/counter.yaml#schemas/IncrementCounterParams
  - name: BackgroundDDLWatcher
    description: Watch and advance a background DDL job
    retryPolicy:
      interval: 5s
      maxAttempts: -1
    events:
      - onFailed
    parameters:
      $ref: ./schemas/background_ddl/background_ddl.yaml#schemas/BackgroundDDLWatcherParameters
